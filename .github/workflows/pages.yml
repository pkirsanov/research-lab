name: pages
on:
  push:
    branches: ["main"]
  schedule:
    # Refresh the cached option chains a few times per US trading day (UTC).
    # ~10:00 / 13:00 / 16:00 ET (EDT) — GitHub cron is best-effort and may lag.
    - cron: "0 14,17,20 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Snapshot option chains (best-effort; never blocks the deploy)
        continue-on-error: true
        run: node scripts/fetch-options.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
